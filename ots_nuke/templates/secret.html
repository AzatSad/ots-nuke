{% extends "base.html" %}

{% block title %}OTS-NUKE // секрет{% endblock %}

{% block content %}
<p class="message message-success" data-text="msgDecrypted">&gt; секрет расшифрован_</p>
<div class="secret-text" id="secret-content">{{ secret_text }}</div>
<p class="warning" data-text="msgDestroyed">&gt; этот секрет уничтожен навсегда</p>
<a href="/" class="btn" data-text="btnNewSecret">&gt; создать новый секрет_</a>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var el = document.getElementById('secret-content');
        if (el) {
            var finalText = el.textContent;
            scrambleText(el, finalText, 1200);
        }
    });
</script>
{% endblock %}
