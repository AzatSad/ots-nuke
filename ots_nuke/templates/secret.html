{% extends "base.html" %}

{% block title %}OTS-NUKE // секрет{% endblock %}

{% block content %}
<p class="message message-success">&gt; секрет расшифрован_</p>
<div class="secret-text" id="secret-content">{{ secret_text }}</div>
<p class="warning">&gt; этот секрет уничтожен</p>
<a href="/" class="btn">&gt; создать новый секрет_</a>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const el = document.getElementById('secret-content');
        if (el) {
            const finalText = el.textContent;
            scrambleText(el, finalText, 1200);
        }
    });
</script>
{% endblock %}
